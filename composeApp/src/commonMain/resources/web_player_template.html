<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>{{title}}</title>
    <!-- Favicon (使用内联 SVG 避免 404 错误) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.12/dist/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <style>
        :root {
            --primary-color: #00aaff;
            --primary-hover: #0088cc;
            --bg-dark: rgba(0, 0, 0, 0.85);
            --bg-darker: rgba(0, 0, 0, 0.95);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --border-color: rgba(255, 255, 255, 0.15);
            --error-color: rgba(255, 0, 0, 0.8);
            --success-color: rgba(0, 255, 136, 0.8);
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --border-radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #000;
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .player-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            height: 100%;
        }

        #video-player {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            cursor: default;
        }

        .video-info {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 16px;
            border-radius: var(--border-radius);
            backdrop-filter: blur(10px);
            z-index: 100;
            max-width: calc(100% - 32px);
            transition: opacity 0.3s ease;
            opacity: 1;
        }

        .video-info.hidden-ui {
            opacity: 0;
            pointer-events: none;
        }

        .video-info__title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .video-info__meta {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .video-info__meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .video-info__meta-item::before {
            content: '•';
            color: var(--primary-color);
        }

        .video-info__meta-item:first-child::before {
            content: '';
        }

        .loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 50;
        }

        .loading-overlay__spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-overlay__text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .error-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--error-color);
            padding: 24px 32px;
            border-radius: var(--border-radius);
            text-align: center;
            z-index: 100;
            max-width: 90%;
        }

        .error-overlay__icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .error-overlay__message {
            font-size: 14px;
            line-height: 1.5;
        }

        .control-panel {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 320px;
            background: var(--bg-dark);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            z-index: 200;
            transition: var(--transition);
            transform: translateX(calc(100% + 16px));
            opacity: 0;
        }

        .control-panel.visible {
            transform: translateX(0);
            opacity: 1;
        }

        .control-panel__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .control-panel__title {
            font-size: 14px;
            font-weight: 600;
        }

        .control-panel__close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: var(--transition);
        }

        .control-panel__close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .control-panel__content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group__label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .input-group__input {
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            transition: var(--transition);
        }

        .input-group__input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.12);
        }

        .input-group__input::placeholder {
            color: var(--text-secondary);
        }

        .toggle-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
        }

        .toggle-group__label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle__input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle__slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: var(--transition);
            border-radius: 12px;
        }

        .toggle__slider::before {
            position: absolute;
            content: '';
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: var(--transition);
            border-radius: 50%;
        }

        .toggle__input:checked + .toggle__slider {
            background-color: var(--primary-color);
        }

        .toggle__input:checked + .toggle__slider::before {
            transform: translateX(20px);
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        .button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .button--primary {
            background: var(--primary-color);
            color: white;
        }

        .button--primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .button--secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .button--secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .toggle-button {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 44px;
            height: 44px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 150;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(5px);
            opacity: 1;
        }

        .toggle-button.hidden-ui {
            opacity: 0;
            pointer-events: none;
        }

        .toggle-button:hover {
            background: var(--bg-darker);
            border-color: var(--primary-color);
            transform: scale(1.05);
        }

        .toggle-button__icon {
            font-size: 20px;
        }

        .hidden {
            display: none !important;
        }

        .player-controls {
            position: absolute;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: var(--border-radius);
            padding: 12px 16px;
            backdrop-filter: blur(15px);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .player-controls.visible {
            opacity: 1;
            display: block !important;
            pointer-events: auto;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin-bottom: 12px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar__buffered {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            width: 0%;
            transition: width 0.2s linear;
            pointer-events: none;
        }

        .progress-bar__filled {
            height: 100%;
            background: var(--primary-color);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
            position: relative;
            z-index: 1;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .play-pause-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: var(--transition);
        }

        .play-pause-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .time-display {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 100px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .volume-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: var(--transition);
        }

        .volume-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .volume-slider__filled {
            height: 100%;
            background: var(--primary-color);
            border-radius: 2px;
            width: 100%;
        }

        .fullscreen-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: var(--transition);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .lock-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            z-index: 160;
            transition: opacity 0.3s ease, background 0.3s ease;
            backdrop-filter: blur(5px);
            opacity: 0;
            pointer-events: none;
        }

        .lock-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .lock-btn:hover {
            background: rgba(0, 0, 0, 0.5);
            border-color: var(--primary-color);
            transform: translateY(-50%) scale(1.05);
        }

        .lock-btn.locked {
            background: rgba(0, 0, 0, 0.6);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .player-wrapper.locked-mode .player-controls,
        .player-wrapper.locked-mode .video-info,
        .player-wrapper.locked-mode .toggle-button,
        .player-wrapper.locked-mode .media-info-panel {
            display: none !important;
        }

        .info-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: var(--transition);
        }

        .info-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .speed-control {
            position: relative;
        }

        .speed-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: var(--transition);
            min-width: 50px;
        }

        .speed-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .speed-menu {
            position: absolute;
            bottom: 100%;
            right: 0;
            margin-bottom: 8px;
            background: rgba(0, 0, 0, 0.9);
            border-radius: var(--border-radius);
            padding: 4px;
            min-width: 80px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
            transition: all 0.2s ease;
            z-index: 200;
        }

        .speed-menu.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .speed-menu__item {
            display: block;
            width: 100%;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
        }

        .speed-menu__item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .speed-menu__item.active {
            color: var(--primary-color);
            font-weight: 600;
        }

        .progress-preview {
            position: absolute;
            bottom: 60px;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            border-radius: var(--border-radius);
            padding: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .progress-preview.visible {
            opacity: 1;
        }

        .progress-preview__thumbnail {
            width: 160px;
            height: 90px;
            background: #000;
            border-radius: 4px;
            object-fit: contain;
            display: none;
        }

        .progress-preview__thumbnail.visible {
            display: block;
        }

        .progress-preview__time {
            font-size: 12px;
            color: var(--text-primary);
            font-weight: 600;
            white-space: nowrap;
        }

        .progress-preview__marker {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid rgba(0, 0, 0, 0.9);
        }

        .media-info-panel {
            position: absolute;
            top: 16px;
            right: 70px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: var(--border-radius);
            padding: 16px;
            backdrop-filter: blur(15px);
            z-index: 200;
            min-width: 280px;
            max-width: 350px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .media-info-panel.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .media-info-panel__title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .media-info-panel__item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .media-info-panel__label {
            color: var(--text-secondary);
            flex-shrink: 0;
            margin-right: 12px;
        }

        .media-info-panel__value {
            color: var(--text-primary);
            text-align: right;
            word-break: break-all;
        }

        .torrent-status {
            margin-top: 8px;
            padding: 8px;
            background: rgba(0, 170, 255, 0.1);
            border-radius: 4px;
            font-size: 12px;
            border-left: 3px solid var(--primary-color);
        }

        .torrent-status__label {
            color: var(--text-secondary);
        }

        .torrent-status__value {
            color: var(--primary-color);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .control-panel {
                width: 280px;
                top: 8px;
                right: 8px;
            }

            .video-info {
                top: 8px;
                left: 8px;
                padding: 8px 12px;
            }

            .video-info__title {
                font-size: 14px;
            }

            .video-info__meta {
                font-size: 11px;
            }

            .toggle-button {
                width: 40px;
                height: 40px;
                top: 8px;
                right: 8px;
            }

            .player-controls {
                bottom: 8px;
                left: 8px;
                right: 8px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="player-wrapper">
            <video id="video-player"></video>
            
            <div class="video-info">
                <div class="video-info__title">{{title}}</div>
                <div class="video-info__meta">
                    <span class="video-info__meta-item" id="ep-name">--</span>
                    <span class="video-info__meta-item" id="ep-number">--</span>
                </div>
            </div>
            
            <div class="loading-overlay hidden" id="loading">
                <div class="loading-overlay__spinner"></div>
                <div class="loading-overlay__text" id="loading-text">正在加载...</div>
            </div>
            
            <div class="error-overlay hidden" id="error">
                <div class="error-overlay__icon">⚠️</div>
                <div class="error-overlay__message" id="error-message">视频加载失败</div>
            </div>
            
            <div class="player-controls hidden" id="player-controls">
                <div class="progress-preview" id="progress-preview">
                    <img class="progress-preview__thumbnail" id="preview-thumbnail" alt="预览">
                    <div class="progress-preview__time" id="preview-time">00:00</div>
                    <div class="progress-preview__marker"></div>
                </div>
                
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-bar__buffered" id="progress-buffered"></div>
                    <div class="progress-bar__filled" id="progress-filled"></div>
                </div>
                <div class="control-buttons">
                    <button class="play-pause-btn" id="play-pause-btn" title="播放/暂停">▶️</button>
                    <div class="time-display" id="time-display">00:00 / 00:00</div>
                    <div class="volume-control">
                        <button class="volume-btn" id="volume-btn" title="静音/取消静音">🔊</button>
                        <div class="volume-slider" id="volume-slider">
                            <div class="volume-slider__filled" id="volume-filled"></div>
                        </div>
                    </div>
                    <div class="speed-control">
                        <button class="speed-btn" id="speed-btn" title="播放速度">1.0x</button>
                        <div class="speed-menu" id="speed-menu">
                            <button class="speed-menu__item" data-speed="0.5">0.5x</button>
                            <button class="speed-menu__item" data-speed="0.75">0.75x</button>
                            <button class="speed-menu__item active" data-speed="1.0">1.0x</button>
                            <button class="speed-menu__item" data-speed="1.25">1.25x</button>
                            <button class="speed-menu__item" data-speed="1.5">1.5x</button>
                            <button class="speed-menu__item" data-speed="2.0">2.0x</button>
                        </div>
                    </div>
                    <button class="info-btn" id="info-btn" title="媒体信息">ℹ️</button>
                    <button class="fullscreen-btn" id="fullscreen-btn" title="全屏播放">⛶</button>
                </div>
            </div>
            
            <button class="toggle-button" id="toggle-panel" title="打开控制面板">
                <span class="toggle-button__icon">⚙️</span>
            </button>
            
            <button class="lock-btn" id="lock-btn" title="锁定控制栏">🔓</button>
            
            <div class="media-info-panel" id="media-info-panel">
                <div class="media-info-panel__title">媒体信息</div>
                <div id="media-info-content"></div>
            </div>
        </div>
        
        <div class="control-panel" id="control-panel">
            <div class="control-panel__header">
                <span class="control-panel__title">播放控制</span>
                <button class="control-panel__close" id="close-panel" title="关闭">✕</button>
            </div>
            
            <div class="control-panel__content">
                <div class="input-group">
                    <label class="input-group__label" for="video-url">视频链接</label>
                    <input type="text" id="video-url" class="input-group__input" placeholder="输入视频URL...">
                </div>
                
                <div class="input-group">
                    <label class="input-group__label" for="video-file">或上传文件</label>
                    <input type="file" id="video-file" class="input-group__input" accept="*/*">
                </div>
                
                <div class="input-group">
                    <label class="input-group__label" for="magnet-url">磁力链接 (Magnet)</label>
                    <input type="text" id="magnet-url" class="input-group__input" placeholder="magnet:?xt=urn:btih:...">
                </div>
                
                <div class="toggle-group">
                    <span class="toggle-group__label">智能本地代理</span>
                    <label class="toggle">
                        <input type="checkbox" id="proxy-toggle" class="toggle__input" checked>
                        <span class="toggle__slider"></span>
                    </label>
                </div>
                
                <div class="button-group">
                    <button class="button button--primary" id="play-btn">播放</button>
                    <button class="button button--secondary" id="clear-btn">清空</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        class VideoPlayer {
            constructor() {
                this.video = null;
                this.hls = null;
                this.ws = null;
                this.retryCount = 0;
                this.maxRetries = 3;
                this.useProxy = true;
                this.torrentClient = null;
                this.currentTorrent = null;
                this.torrentStatusInterval = null;
                
                this.elements = {
                    video: document.getElementById('video-player'),
                    videoInfo: document.querySelector('.video-info'),
                    loading: document.getElementById('loading'),
                    loadingText: document.getElementById('loading-text'),
                    error: document.getElementById('error'),
                    errorMessage: document.getElementById('error-message'),
                    controlPanel: document.getElementById('control-panel'),
                    toggleButton: document.getElementById('toggle-panel'),
                    closeButton: document.getElementById('close-panel'),
                    videoUrl: document.getElementById('video-url'),
                    videoFile: document.getElementById('video-file'),
                    magnetUrl: document.getElementById('magnet-url'),
                    proxyToggle: document.getElementById('proxy-toggle'),
                    playBtn: document.getElementById('play-btn'),
                    clearBtn: document.getElementById('clear-btn'),
                    epName: document.getElementById('ep-name'),
                    epNumber: document.getElementById('ep-number'),
                    playerControls: document.getElementById('player-controls'),
                    playPauseBtn: document.getElementById('play-pause-btn'),
                    progressBar: document.getElementById('progress-bar'),
                    progressFilled: document.getElementById('progress-filled'),
                    progressBuffered: document.getElementById('progress-buffered'),
                    timeDisplay: document.getElementById('time-display'),
                    volumeBtn: document.getElementById('volume-btn'),
                    volumeSlider: document.getElementById('volume-slider'),
                    volumeFilled: document.getElementById('volume-filled'),
                    fullscreenBtn: document.getElementById('fullscreen-btn'),
                    lockBtn: document.getElementById('lock-btn'),
                    infoBtn: document.getElementById('info-btn'),
                    mediaInfoPanel: document.getElementById('media-info-panel'),
                    mediaInfoContent: document.getElementById('media-info-content'),
                    speedBtn: document.getElementById('speed-btn'),
                    speedMenu: document.getElementById('speed-menu')
                };
                
                this.controlsTimer = null;
                this.controlsTimeout = 3000;
                this.isDraggingVolume = false;
                
                this.progressPreview = document.getElementById('progress-preview');
                this.previewThumbnail = document.getElementById('preview-thumbnail');
                this.previewTime = document.getElementById('preview-time');
                this.frameCache = new Map();
                this.lastPreviewTime = -1;
                this.isHoveringProgressBar = false;
                
                this.isLocked = false;
                
                this.mouseMoveTimer = null;
                this.lastMouseMoveTime = 0;
                
                this.mediaUrl = '{{mediaUrl}}';
                this.videoInfo = {
                    epName: null,
                    epNumber: null
                };
                
                this.init();
            }
            
            async init() {
                this.bindEvents();
                await this.connectWebSocket();
                await this.initPlayer();
                
                // 监听页面关闭事件，主动断开WebSocket连接
                window.addEventListener('beforeunload', () => this.cleanupWebSocket());
                window.addEventListener('pagehide', () => this.cleanupWebSocket());
            }
            
            bindEvents() {
                console.log('[Init] Binding events...');
                this.elements.videoInfo.classList.add('hidden-ui');
                this.elements.toggleButton.classList.add('hidden-ui');
                this.elements.lockBtn.classList.remove('visible');
                
                this.elements.toggleButton.addEventListener('click', () => this.togglePanel());
                this.elements.closeButton.addEventListener('click', () => this.togglePanel());
                this.elements.playBtn.addEventListener('click', () => this.playVideo());
                this.elements.clearBtn.addEventListener('click', () => this.clearInputs());
                this.elements.proxyToggle.addEventListener('change', (e) => {
                    this.useProxy = e.target.checked;
                });
                this.elements.videoUrl.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.playVideo();
                });
                this.elements.magnetUrl.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.playVideo();
                });
                
                this.elements.playPauseBtn.addEventListener('click', () => this.togglePlayPause());
                this.elements.progressBar.addEventListener('click', (e) => this.seekVideo(e));
                this.elements.volumeBtn.addEventListener('click', () => this.toggleMute());
                this.elements.fullscreenBtn.addEventListener('click', () => this.toggleFullscreen());
                this.elements.lockBtn.addEventListener('click', () => this.toggleLock());
                this.elements.infoBtn.addEventListener('click', () => this.toggleMediaInfo());
                this.elements.speedBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.toggleSpeedMenu();
                });
                
                this.elements.volumeSlider.addEventListener('mousedown', (e) => this.startDraggingVolume(e));
                document.addEventListener('mousemove', (e) => this.onDraggingVolume(e));
                document.addEventListener('mouseup', () => this.stopDraggingVolume());
                
                this.elements.progressBar.addEventListener('mousemove', (e) => this.showProgressPreview(e));
                this.elements.progressBar.addEventListener('mouseleave', () => this.hideProgressPreview());
                
                document.querySelectorAll('.speed-menu__item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        const speed = parseFloat(e.target.dataset.speed);
                        this.setPlaybackSpeed(speed);
                        this.toggleSpeedMenu();
                    });
                });
                
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.speed-control')) {
                        this.elements.speedMenu.classList.remove('visible');
                    }
                });
                
                this.elements.video.addEventListener('loadedmetadata', () => {
                    this.updateDuration();
                    this.showControls();
                    setTimeout(() => {
                        if (!this.isHoveringProgressBar) {
                            this.hideControls();
                        }
                    }, 2000);
                });
                this.elements.video.addEventListener('timeupdate', () => this.updateProgress());
                this.elements.video.addEventListener('progress', () => this.updateBuffered());
                this.elements.video.addEventListener('play', () => this.onPlay());
                this.elements.video.addEventListener('pause', () => this.onPause());
                this.elements.video.addEventListener('ended', () => this.onEnded());
                this.elements.video.addEventListener('error', (e) => this.onError(e));
                this.elements.video.addEventListener('waiting', () => this.showLoading('缓冲中...'));
                this.elements.video.addEventListener('playing', () => this.hideLoading());
                
                const playerWrapper = this.elements.video.parentElement;
                playerWrapper.addEventListener('mouseenter', () => this.showControls());
                playerWrapper.addEventListener('mouseleave', () => this.hideControls());
                
                this.elements.video.addEventListener('click', () => this.toggleControls());
                
                playerWrapper.addEventListener('mousemove', (e) => this.handleMouseMove(e));
                
                document.addEventListener('fullscreenchange', () => this.handleFullscreenChange());
            }
            
            togglePanel() {
                this.elements.controlPanel.classList.toggle('visible');
            }
            
            clearInputs() {
                this.elements.videoUrl.value = '';
                this.elements.videoFile.value = '';
                this.elements.magnetUrl.value = '';
                
                this.cleanupTorrent();
            }
            
            cleanupTorrent() {
                if (this.torrentStatusInterval) {
                    clearInterval(this.torrentStatusInterval);
                    this.torrentStatusInterval = null;
                }
                
                if (this.currentTorrent) {
                    this.currentTorrent.destroy();
                    this.currentTorrent = null;
                }
                
                if (this.torrentClient) {
                    this.torrentClient.destroy();
                    this.torrentClient = null;
                }
            }
            
            async connectWebSocket() {
                if (this.retryCount >= this.maxRetries) {
                    console.error('[WebSocket] 连接失败，达到最大重试次数');
                    return;
                }
                
                try {
                    // 从 URL 参数中获取 Ktor 端口（用于 WebSocket 连接）
                    const urlParams = new URLSearchParams(window.location.search);
                    const ktorPort = urlParams.get('ktorPort') || '9978';
                    
                    console.log(`[WebSocket] 连接到 Ktor 服务器: ws://localhost:${ktorPort}/ws/video-events`);
                    this.ws = new WebSocket(`ws://localhost:${ktorPort}/ws/video-events`);
                    
                    this.ws.onopen = () => {
                        console.log('[WebSocket] 连接已建立');
                        this.retryCount = 0;
                        // 通知服务器播放开始
                        this.sendWebSocketMessage('PLAYBACK_STARTED');
                    };
                    
                    this.ws.onclose = (event) => {
                        console.log(`[WebSocket] 连接已关闭 (code: ${event.code}, reason: ${event.reason})`);
                        
                        // 如果是正常关闭（页面主动关闭），不再重连
                        if (event.code === 1000 && event.reason === 'Page closing') {
                            console.log('[WebSocket] 页面主动关闭，停止重连');
                            return;
                        }
                        
                        // 其他情况尝试重连
                        setTimeout(() => {
                            this.retryCount++;
                            console.log(`[WebSocket] 尝试第 ${this.retryCount} 次重连...`);
                            this.connectWebSocket();
                        }, 2000 * Math.pow(1.5, this.retryCount - 1)); // 指数退避
                    };
                    
                    this.ws.onerror = (error) => {
                        console.error('[WebSocket] 错误:', error);
                    };
                } catch (error) {
                    console.error('[WebSocket] 连接异常:', error);
                    setTimeout(() => {
                        this.retryCount++;
                        console.log(`[WebSocket] 异常后尝试第 ${this.retryCount} 次重连...`);
                        this.connectWebSocket();
                    }, 2000 * Math.pow(1.5, this.retryCount - 1)); // 指数退避
                }
            }
            
            async initPlayer() {
                console.log('初始化播放器:', this.mediaUrl);
                
                this.parseVideoInfo(this.mediaUrl);
                this.updateVideoInfo();
                
                if (this.mediaUrl) {
                    await this.playUrl(this.mediaUrl);
                }
            }
            
            parseVideoInfo(url) {
                try {
                    const urlObj = new URL(url);
                    const params = new URLSearchParams(urlObj.search);
                    
                    this.videoInfo.epName = params.get('epname') || params.get('name') || null;
                    this.videoInfo.epNumber = params.get('epnumber') || params.get('episode') || null;
                    
                    console.log('解析视频信息:', this.videoInfo);
                } catch (error) {
                    console.error('解析视频信息失败:', error);
                }
            }
            
            updateVideoInfo() {
                if (this.videoInfo.epName) {
                    this.elements.epName.textContent = this.videoInfo.epName;
                    this.elements.epName.classList.remove('hidden');
                } else {
                    this.elements.epName.classList.add('hidden');
                }
                
                if (this.videoInfo.epNumber) {
                    this.elements.epNumber.textContent = `第${this.videoInfo.epNumber}集`;
                    this.elements.epNumber.classList.remove('hidden');
                } else {
                    this.elements.epNumber.classList.add('hidden');
                }
            }
            
            detectVideoType(url) {
                if (url.startsWith('magnet:?')) {
                    return 'magnet';
                }
                            
                const urlWithoutParams = url.split('?')[0].toLowerCase();
                            
                if (urlWithoutParams.includes('.m3u8')) return 'hls';
                if (urlWithoutParams.includes('.mpd')) return 'dash';
                if (urlWithoutParams.includes('.mp4')) return 'mp4';
                if (urlWithoutParams.includes('.webm')) return 'webm';
                if (urlWithoutParams.includes('.flv')) return 'flv';
                if (urlWithoutParams.includes('.ts')) return 'ts';
                            
                return 'auto';
            }
            
            async playVideo() {
                const url = this.elements.videoUrl.value.trim();
                const file = this.elements.videoFile.files[0];
                const magnetUrl = this.elements.magnetUrl.value.trim();
                
                if (!url && !file && !magnetUrl) {
                    alert('请输入视频URL、上传文件或输入磁力链接');
                    return;
                }
                
                this.hideError();
                this.cleanupTorrent();
                
                if (magnetUrl) {
                    await this.playMagnet(magnetUrl);
                } else if (file) {
                    await this.playFile(file);
                } else if (url) {
                    await this.playUrl(url);
                }
            }
            
            async playFile(file) {
                this.showLoading('正在加载文件...');
                
                try {
                    const fileUrl = URL.createObjectURL(file);
                    await this.playUrl(fileUrl);
                } catch (error) {
                    console.error('文件播放失败:', error);
                    this.showError('文件播放失败: ' + error.message);
                }
            }
            
            async playUrl(url) {
                console.log('playUrl 开始执行, URL:', url);
                
                if (url.startsWith('magnet:?')) {
                    await this.playMagnet(url);
                    return;
                }
                
                this.parseVideoInfo(url);
                this.updateVideoInfo();
                
                const videoType = this.detectVideoType(url);
                console.log('视频类型:', videoType);
                
                let playUrl = url;
                if (this.useProxy && this.needProxy(url)) {
                    playUrl = this.getProxyUrl(this.extractOriginalUrl(url));
                }
                console.log('最终播放URL:', playUrl);
                
                this.showLoading('正在加载视频...');
                
                if (this.hls) {
                    this.hls.destroy();
                    this.hls = null;
                }
                
                this.elements.video.pause();
                this.elements.video.src = '';
                
                try {
                    if (videoType === 'hls') {
                        this.playHls(playUrl);
                    } else {
                        this.playNormal(playUrl);
                    }
                } catch (error) {
                    console.error('播放失败:', error);
                    this.showError('播放失败: ' + error.message);
                }
            }
            
            playHls(url) {
                if (!Hls.isSupported()) {
                    throw new Error('浏览器不支持HLS播放');
                }
                
                this.hls = new Hls({
                    enableWorker: false,
                    lowLatencyMode: true,
                    backBufferLength: 90
                });
                
                this.hls.loadSource(url);
                this.hls.attachMedia(this.elements.video);
                
                this.hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    this.hideLoading();
                    this.elements.video.play().catch(err => {
                        console.warn('HLS自动播放被阻止:', err);
                    });
                });
                
                this.hls.on(Hls.Events.ERROR, (event, data) => {
                    console.error('HLS错误:', data);
                    if (data.fatal) {
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                this.hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                this.hls.recoverMediaError();
                                break;
                            default:
                                this.hls.destroy();
                                this.showError('HLS播放失败');
                                break;
                        }
                    }
                });
            }
            
            async playNormal(url) {
                this.elements.video.src = url;
                
                this.elements.video.play().catch(err => {
                    console.warn('自动播放被阻止:', err.message);
                });
            }
            
            async playMagnet(magnetUrl) {
                console.log('[WebTorrent] 开始播放磁力链接:', magnetUrl);
                
                if (!magnetUrl.startsWith('magnet:?')) {
                    this.showError('无效的磁力链接格式');
                    return;
                }
                
                this.showLoading('正在初始化 WebTorrent...');
                
                try {
                    // 创建 WebTorrent 客户端
                    if (!this.torrentClient) {
                        this.torrentClient = new WebTorrent();
                        console.log('[WebTorrent] 客户端已创建');
                    }
                    
                    this.showLoading('正在获取种子信息...');
                    
                    // 添加磁力链接
                    this.torrentClient.add(magnetUrl, (torrent) => {
                        console.log('[WebTorrent] 种子已添加:', torrent.infoHash);
                        this.currentTorrent = torrent;
                        
                        // 更新加载状态
                        this.showLoading(`正在连接 Peers... (0 个连接)`);
                        
                        // 监听 peer 连接
                        torrent.on('ready', () => {
                            console.log('[WebTorrent] 种子已就绪');
                            this.showLoading('种子已就绪，正在查找视频文件...');
                        });
                        
                        // 监听下载进度
                        torrent.on('download', () => {
                            const progress = (torrent.progress * 100).toFixed(1);
                            const downloadSpeed = (torrent.downloadSpeed / 1024 / 1024).toFixed(2);
                            const uploadSpeed = (torrent.uploadSpeed / 1024 / 1024).toFixed(2);
                            const peers = torrent.numPeers;
                            
                            this.showLoading(`下载进度: ${progress}% | 速度: ${downloadSpeed} MB/s | Peers: ${peers}`);
                            
                            // 更新媒体信息面板中的种子状态
                            this.updateTorrentStatus();
                        });
                        
                        // 监听完成事件
                        torrent.on('done', () => {
                            console.log('[WebTorrent] 下载完成！');
                            this.showLoading('下载完成！');
                            setTimeout(() => this.hideLoading(), 1000);
                        });
                        
                        // 监听错误
                        torrent.on('error', (err) => {
                            console.error('[WebTorrent] 错误:', err);
                            this.showError('种子加载失败: ' + err.message);
                        });
                        
                        // 监听警告
                        torrent.on('warning', (warn) => {
                            console.warn('[WebTorrent] 警告:', warn);
                        });
                        
                        // 查找视频文件
                        const videoFile = torrent.files.find(file => {
                            const ext = file.name.split('.').pop().toLowerCase();
                            return ['mp4', 'webm', 'mkv', 'avi', 'mov', 'flv', 'wmv', 'm4v'].includes(ext);
                        });
                        
                        if (!videoFile) {
                            this.showError('未找到可播放的视频文件');
                            console.error('[WebTorrent] 文件列表:', torrent.files.map(f => f.name));
                            return;
                        }
                        
                        console.log('[WebTorrent] 找到视频文件:', videoFile.name);
                        console.log('[WebTorrent] 文件大小:', (videoFile.length / 1024 / 1024).toFixed(2), 'MB');
                        
                        // 更新视频信息显示
                        this.updateVideoInfoDisplay(
                            `📦 ${torrent.name || '种子文件'}`,
                            `🎬 ${videoFile.name}`
                        );
                        
                        // 渲染视频到 video 元素
                        this.showLoading('正在渲染视频...');
                        
                        videoFile.renderTo(this.elements.video, {
                            autoplay: false,
                            controls: false
                        }, (err) => {
                            if (err) {
                                console.error('[WebTorrent] 渲染失败:', err);
                                this.showError('视频渲染失败: ' + err.message);
                                return;
                            }
                            
                            console.log('[WebTorrent] 视频渲染成功');
                            this.hideLoading();
                            
                            // 尝试自动播放
                            this.elements.video.play().catch(playErr => {
                                console.warn('[WebTorrent] 自动播放被阻止:', playErr.message);
                            });
                        });
                        
                        // 启动状态更新定时器
                        this.startTorrentStatusUpdates();
                    });
                    
                } catch (error) {
                    console.error('[WebTorrent] 播放失败:', error);
                    this.showError('磁力链接播放失败: ' + error.message);
                }
            }
            
            startTorrentStatusUpdates() {
                if (this.torrentStatusInterval) {
                    clearInterval(this.torrentStatusInterval);
                }
                
                this.torrentStatusInterval = setInterval(() => {
                    this.updateTorrentStatus();
                }, 1000);
            }
            
            updateTorrentStatus() {
                if (!this.currentTorrent) return;
                
                const torrent = this.currentTorrent;
                const progress = (torrent.progress * 100).toFixed(1);
                const downloadSpeed = (torrent.downloadSpeed / 1024 / 1024).toFixed(2);
                const uploadSpeed = (torrent.uploadSpeed / 1024 / 1024).toFixed(2);
                const peers = torrent.numPeers;
                const downloaded = (torrent.downloaded / 1024 / 1024).toFixed(0);
                const total = (torrent.length / 1024 / 1024).toFixed(0);
                
                // 可以在这里更新 UI 显示种子状态
                console.log(`[WebTorrent] 进度: ${progress}% | ${downloaded}/${total}MB | ↓${downloadSpeed}MB/s ↑${uploadSpeed}MB/s | Peers: ${peers}`);
            }
            
            updateVideoInfoDisplay(epName, epNumber) {
                if (this.elements.epName) {
                    this.elements.epName.textContent = epName || '--';
                }
                if (this.elements.epNumber) {
                    this.elements.epNumber.textContent = epNumber || '--';
                }
            }
            
            needProxy(url) {
                if (url.includes('localhost:9978') || url.includes('127.0.0.1:9978')) {
                    return false;
                }
                
                const isLocal = url.includes('localhost') || url.includes('127.0.0.1') || 
                               url.includes('192.168.') || url.includes('10.') || url.includes('172.');
                
                return !isLocal;
            }
            
            extractOriginalUrl(url) {
                if (url.includes('proxy?url=')) {
                    const urlObj = new URL(url);
                    const originalUrl = urlObj.searchParams.get('url');
                    if (originalUrl) {
                        return decodeURIComponent(originalUrl);
                    }
                }
                return url;
            }
            
            getProxyUrl(url) {
                return `http://localhost:9978/video/proxy?url=${encodeURIComponent(url)}`;
            }
            
            startDraggingVolume(e) {
                this.isDraggingVolume = true;
                this.setVolumeFromEvent(e);
                e.preventDefault();
            }
            
            onDraggingVolume(e) {
                if (this.isDraggingVolume) {
                    this.setVolumeFromEvent(e);
                }
            }
            
            stopDraggingVolume() {
                this.isDraggingVolume = false;
            }
            
            setVolumeFromEvent(e) {
                const rect = this.elements.volumeSlider.getBoundingClientRect();
                let percent = (e.clientX - rect.left) / rect.width;
                percent = Math.max(0, Math.min(1, percent));
                this.elements.video.volume = percent;
                this.elements.video.muted = false;
                this.updateVolumeIcon();
                this.updateProgress();
            }
            
            togglePlayPause() {
                if (this.elements.video.paused) {
                    this.elements.video.play();
                    this.resetControlsTimer();
                } else {
                    this.elements.video.pause();
                    this.clearControlsTimer();
                }
            }
            
            seekVideo(e) {
                const rect = this.elements.progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                this.elements.video.currentTime = percent * this.elements.video.duration;
            }
            
            toggleMute() {
                this.elements.video.muted = !this.elements.video.muted;
                this.updateVolumeIcon();
            }
            
            updateVolumeIcon() {
                if (this.elements.video.muted || this.elements.video.volume === 0) {
                    this.elements.volumeBtn.textContent = '🔇';
                } else if (this.elements.video.volume < 0.5) {
                    this.elements.volumeBtn.textContent = '🔈';
                } else {
                    this.elements.volumeBtn.textContent = '🔊';
                }
            }
            
            updateDuration() {
                this.updateProgress();
            }
            
            updateProgress() {
                const video = this.elements.video;
                if (!video.duration) return;
                
                const percent = (video.currentTime / video.duration) * 100;
                this.elements.progressFilled.style.width = percent + '%';
                
                const currentTime = this.formatTime(video.currentTime);
                const duration = this.formatTime(video.duration);
                this.elements.timeDisplay.textContent = `${currentTime} / ${duration}`;
                
                this.elements.volumeFilled.style.width = (video.volume * 100) + '%';
            }
            
            updateBuffered() {
                const video = this.elements.video;
                if (!video.duration || video.buffered.length === 0) return;
                
                const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                const percent = (bufferedEnd / video.duration) * 100;
                this.elements.progressBuffered.style.width = percent + '%';
            }
            
            formatTime(seconds) {
                if (isNaN(seconds)) return '00:00';
                
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
            
            onPlay() {
                this.elements.playPauseBtn.textContent = '⏸️';
                this.sendWebSocketMessage('PLAYBACK_STARTED');
                this.hideLoading();
                this.hideError();
                this.resetControlsTimer();
            }
            
            onPause() {
                this.elements.playPauseBtn.textContent = '▶️';
            }
            
            onEnded() {
                console.log('[Playback] 视频播放完成');
                this.sendWebSocketMessage('PLAYBACK_FINISHED');
                
                // 播放完成后，延迟关闭WebSocket连接，给服务器时间处理消息
                setTimeout(() => {
                    this.cleanupWebSocket();
                }, 500);
            }
            
            onError(e) {
                console.error('播放器错误:', e);
                this.showError('视频播放失败');
            }
            
            toggleFullscreen() {
                if (!document.fullscreenElement) {
                    this.elements.video.requestFullscreen().then(() => {
                        this.elements.fullscreenBtn.textContent = '⛶';
                    }).catch(err => {
                        console.error('[Fullscreen] 无法进入全屏:', err);
                    });
                } else {
                    document.exitFullscreen().then(() => {
                        this.elements.fullscreenBtn.textContent = '⛶';
                    });
                }
            }
            
            handleFullscreenChange() {
                const isFullscreen = !!document.fullscreenElement;
                
                if (isFullscreen) {
                    this.showControls();
                    setTimeout(() => {
                        if (!this.isHoveringProgressBar) {
                            this.hideControls();
                        }
                    }, 2000);
                }
            }
            
            toggleLock() {
                this.isLocked = !this.isLocked;
                
                if (this.isLocked) {
                    this.elements.lockBtn.textContent = '🔒';
                    this.elements.lockBtn.classList.add('locked');
                    this.elements.lockBtn.title = '解锁控制栏';
                    document.querySelector('.player-wrapper').classList.add('locked-mode');
                    this.elements.lockBtn.classList.add('visible');
                } else {
                    this.elements.lockBtn.textContent = '🔓';
                    this.elements.lockBtn.classList.remove('locked');
                    this.elements.lockBtn.title = '锁定控制栏';
                    document.querySelector('.player-wrapper').classList.remove('locked-mode');
                    this.elements.lockBtn.classList.remove('visible');
                    this.showControls();
                }
            }
            
            toggleSpeedMenu() {
                this.elements.speedMenu.classList.toggle('visible');
            }
            
            setPlaybackSpeed(speed) {
                this.elements.video.playbackRate = speed;
                this.elements.speedBtn.textContent = speed + 'x';
                
                document.querySelectorAll('.speed-menu__item').forEach(item => {
                    const itemSpeed = parseFloat(item.dataset.speed);
                    if (itemSpeed === speed) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
            }
            
            toggleMediaInfo() {
                const isVisible = this.elements.mediaInfoPanel.classList.contains('visible');
                
                if (isVisible) {
                    this.elements.mediaInfoPanel.classList.remove('visible');
                } else {
                    this.updateMediaInfo();
                    this.elements.mediaInfoPanel.classList.add('visible');
                }
            }
            
            updateMediaInfo() {
                const video = this.elements.video;
                let info = [];
                
                if (video.src) {
                    info.push({ label: '视频链接', value: video.src });
                }
                
                if (video.duration && !isNaN(video.duration)) {
                    info.push({ label: '时长', value: this.formatTime(video.duration) });
                }
                
                if (video.videoWidth && video.videoHeight) {
                    info.push({ label: '分辨率', value: `${video.videoWidth} x ${video.videoHeight}` });
                }
                
                info.push({ label: '音量', value: `${Math.round(video.volume * 100)}%` });
                info.push({ label: '静音状态', value: video.muted ? '是' : '否' });
                info.push({ label: '播放速率', value: `${video.playbackRate}x` });
                
                // 如果是 WebTorrent，添加种子状态
                if (this.currentTorrent) {
                    const torrent = this.currentTorrent;
                    info.push({ label: '━━━━━━━━━━', value: '━━━━━━━━━━' });
                    info.push({ label: '📦 种子名称', value: torrent.name || '未知' });
                    info.push({ label: '📊 下载进度', value: `${(torrent.progress * 100).toFixed(1)}%` });
                    info.push({ label: '⬇️ 下载速度', value: `${(torrent.downloadSpeed / 1024 / 1024).toFixed(2)} MB/s` });
                    info.push({ label: '⬆️ 上传速度', value: `${(torrent.uploadSpeed / 1024 / 1024).toFixed(2)} MB/s` });
                    info.push({ label: '👥 Peers', value: torrent.numPeers });
                    info.push({ label: '💾 已下载', value: `${(torrent.downloaded / 1024 / 1024).toFixed(0)} MB` });
                    info.push({ label: '📁 总大小', value: `${(torrent.length / 1024 / 1024).toFixed(0)} MB` });
                }
                
                this.elements.mediaInfoContent.innerHTML = info.map(item => `
                    <div class="media-info-panel__item">
                        <span class="media-info-panel__label">${item.label}</span>
                        <span class="media-info-panel__value">${item.value}</span>
                    </div>
                `).join('');
            }
            
            handleMouseMove(e) {
                const now = Date.now();
                
                if (now - this.lastMouseMoveTime < 50) return;
                this.lastMouseMoveTime = now;
                
                if (this.isLocked) {
                    this.elements.lockBtn.classList.add('visible');
                    
                    if (this.mouseMoveTimer) {
                        clearTimeout(this.mouseMoveTimer);
                    }
                    
                    this.mouseMoveTimer = setTimeout(() => {
                        this.elements.lockBtn.classList.remove('visible');
                    }, this.controlsTimeout);
                    return;
                }
                
                this.showControls();
                
                if (this.mouseMoveTimer) {
                    clearTimeout(this.mouseMoveTimer);
                }
                
                this.mouseMoveTimer = setTimeout(() => {
                    if (!this.isHoveringProgressBar) {
                        this.hideControls();
                    }
                }, this.controlsTimeout);
            }
                    
            showProgressPreview(e) {
                const rect = this.elements.progressBar.getBoundingClientRect();
                const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                const time = percent * this.elements.video.duration;
                        
                if (!this.elements.video.duration || isNaN(time)) return;
                        
                this.isHoveringProgressBar = true;
                this.clearControlsTimer();
                        
                if (Math.abs(time - this.lastPreviewTime) < 0.5) return;
                this.lastPreviewTime = time;
                        
                this.previewTime.textContent = this.formatTime(time);
                        
                const previewX = e.clientX - rect.left;
                this.progressPreview.style.left = previewX + 'px';
                this.progressPreview.classList.add('visible');
                        
                if (this.canShowFramePreview(this.elements.video.src)) {
                    this.loadFramePreview(time);
                } else {
                    this.previewThumbnail.classList.remove('visible');
                }
            }
                    
            hideProgressPreview() {
                this.progressPreview.classList.remove('visible');
                this.lastPreviewTime = -1;
                this.isHoveringProgressBar = false;
                this.resetControlsTimer();
            }
                    
            canShowFramePreview(url) {
                if (!url) return false;
                if (url.includes('.m3u8') || url.includes('.m3u')) return false;
                return url.match(/\.(mp4|mkv|webm|avi|mov)$/i) !== null;
            }
                    
            async loadFramePreview(targetTime) {
                const cacheKey = Math.floor(targetTime);
                if (this.frameCache.has(cacheKey)) {
                    this.previewThumbnail.src = this.frameCache.get(cacheKey);
                    this.previewThumbnail.classList.add('visible');
                    return;
                }
                        
                try {
                    const tempVideo = document.createElement('video');
                    tempVideo.src = this.elements.video.src;
                    tempVideo.muted = true;
                    tempVideo.preload = 'auto';
                            
                    await new Promise((resolve, reject) => {
                        tempVideo.addEventListener('loadedmetadata', resolve);
                        tempVideo.addEventListener('error', reject);
                        setTimeout(reject, 3000);
                    });
                            
                    tempVideo.currentTime = targetTime;
                            
                    await new Promise((resolve) => {
                        tempVideo.addEventListener('seeked', resolve, { once: true });
                    });
                            
                    const canvas = document.createElement('canvas');
                    canvas.width = 320;
                    canvas.height = 180;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(tempVideo, 0, 0, canvas.width, canvas.height);
                            
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                            
                    this.frameCache.set(cacheKey, dataUrl);
                            
                    if (this.frameCache.size > 20) {
                        const firstKey = this.frameCache.keys().next().value;
                        this.frameCache.delete(firstKey);
                    }
                            
                    this.previewThumbnail.src = dataUrl;
                    this.previewThumbnail.classList.add('visible');
                            
                    tempVideo.remove();
                    canvas.remove();
                            
                } catch (error) {
                    console.warn('帧预览加载失败:', error);
                    this.previewThumbnail.classList.remove('visible');
                }
            }
            
            showControls() {
                this.elements.playerControls.classList.add('visible');
                this.elements.videoInfo.classList.remove('hidden-ui');
                this.elements.toggleButton.classList.remove('hidden-ui');
                
                this.elements.lockBtn.classList.add('visible');
                
                this.resetControlsTimer();
            }
            
            hideControls() {
                this.clearControlsTimer();
                this.elements.playerControls.classList.remove('visible');
                this.elements.videoInfo.classList.add('hidden-ui');
                this.elements.toggleButton.classList.add('hidden-ui');
                
                if (!this.isLocked) {
                    this.elements.lockBtn.classList.remove('visible');
                }
            }
            
            toggleControls() {
                if (this.isLocked) return;
                
                const isVisible = this.elements.playerControls.classList.contains('visible');
                if (isVisible) {
                    this.hideControls();
                } else {
                    this.showControls();
                }
            }
            
            resetControlsTimer() {
                this.clearControlsTimer();
                if (!this.elements.video.paused && !this.isHoveringProgressBar) {
                    this.controlsTimer = setTimeout(() => {
                        this.hideControls();
                    }, this.controlsTimeout);
                }
            }
            
            clearControlsTimer() {
                if (this.controlsTimer) {
                    clearTimeout(this.controlsTimer);
                    this.controlsTimer = null;
                }
            }
            
            showLoading(text = '正在加载...') {
                this.elements.loadingText.textContent = text;
                this.elements.loading.classList.remove('hidden');
            }
            
            hideLoading() {
                this.elements.loading.classList.add('hidden');
            }
            
            showError(message) {
                this.elements.errorMessage.textContent = message;
                this.elements.error.classList.remove('hidden');
                this.hideLoading();
            }
            
            hideError() {
                this.elements.error.classList.add('hidden');
            }
            
            sendWebSocketMessage(message) {
                if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                    this.ws.send(message);
                }
            }
            
            /**
             * 清理WebSocket连接
             * 在页面关闭时调用，避免服务端持续重连
             */
            cleanupWebSocket() {
                if (this.ws) {
                    console.log('[Cleanup] 页面关闭，断开WebSocket连接');
                    // 阻止自动重连
                    this.retryCount = this.maxRetries;
                    // 关闭连接
                    this.ws.close(1000, 'Page closing');
                    this.ws = null;
                }
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            new VideoPlayer();
        });
    </script>
</body>
</html>
